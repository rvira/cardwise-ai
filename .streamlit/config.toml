[server]
# Disable the local-sources module watcher. Streamlit otherwise introspects
# every module in sys.modules on each rerun; transformers (pulled in
# transitively by chromadb/langchain) lazily imports a torchvision-dependent
# submodule on attribute access, which crashes with
# "ModuleNotFoundError: No module named 'torchvision'".
# This app uses Gemini only and needs none of the torch stack.
fileWatcherType = "none"

[theme]
# Polished light theme for the CardWise advisor UI.
base = "light"
primaryColor = "#6C5CE7"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F2FF"
textColor = "#1E1B2E"
font = "sans serif"
