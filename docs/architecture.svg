<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="480" rx="18" fill="#ffffff"/>
  <text x="450" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">CardWise · RAG Architecture</text>

  <!-- Lane backgrounds -->
  <rect x="24" y="78" width="752" height="98" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="24" y="352" width="854" height="98" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="40" y="70" font-size="12" font-weight="700" letter-spacing="1.2" fill="#64748b">📥  INGESTION — offline</text>
  <text x="40" y="344" font-size="12" font-weight="700" letter-spacing="1.2" fill="#64748b">💬  QUERY — runtime</text>

  <!-- Ingestion nodes -->
  <g filter="url(#shadow)">
    <rect x="40"  y="98" width="160" height="64" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="224" y="98" width="160" height="64" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="408" y="98" width="160" height="64" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="592" y="98" width="160" height="64" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="120" y="126" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">📄 Card PDFs</text>
  <text x="120" y="145" text-anchor="middle" font-size="11" fill="#6366f1">data/raw</text>
  <text x="304" y="126" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">load_card_pdf</text>
  <text x="304" y="145" text-anchor="middle" font-size="11" fill="#10b981">PyMuPDF</text>
  <text x="488" y="126" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">chunk_document</text>
  <text x="488" y="145" text-anchor="middle" font-size="11" fill="#10b981">recursive split</text>
  <text x="672" y="126" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">embed</text>
  <text x="672" y="145" text-anchor="middle" font-size="11" fill="#3b82f6">gemini-embedding-001</text>

  <!-- Ingestion horizontal arrows -->
  <line x1="200" y1="130" x2="222" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="384" y1="130" x2="406" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="568" y1="130" x2="590" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Chroma store -->
  <g filter="url(#shadow)">
    <rect x="370" y="246" width="160" height="64" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="450" y="274" text-anchor="middle" font-size="15" font-weight="600" fill="#92400e">🗄️ Chroma</text>
  <text x="450" y="293" text-anchor="middle" font-size="11" fill="#b45309">vector store</text>

  <!-- embed -> Chroma (write) -->
  <path d="M672,162 C672,212 520,205 500,244" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="208" font-size="11" font-weight="600" fill="#64748b">index</text>

  <!-- Chroma -> retriever (read) -->
  <path d="M410,310 C410,346 300,338 283,370" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="318" y="340" font-size="11" font-weight="600" fill="#64748b">retrieve</text>

  <!-- Query nodes -->
  <g filter="url(#shadow)">
    <rect x="40"  y="372" width="150" height="64" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="208" y="372" width="150" height="64" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="376" y="372" width="150" height="64" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="544" y="372" width="150" height="64" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="712" y="372" width="150" height="64" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <text x="115" y="400" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">❓ Question</text>
  <text x="115" y="419" text-anchor="middle" font-size="11" fill="#6366f1">user input</text>
  <text x="283" y="400" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">retriever</text>
  <text x="283" y="419" text-anchor="middle" font-size="11" fill="#10b981">MMR · k=6</text>
  <text x="451" y="404" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">citation prompt</text>
  <text x="619" y="400" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">gemini-2.5-flash</text>
  <text x="619" y="419" text-anchor="middle" font-size="11" fill="#3b82f6">generation</text>
  <text x="787" y="400" text-anchor="middle" font-size="15" font-weight="600" fill="#991b1b">✅ Cited answer</text>
  <text x="787" y="419" text-anchor="middle" font-size="11" fill="#ef4444">grounded</text>

  <!-- Query horizontal arrows -->
  <line x1="190" y1="404" x2="206" y2="404" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="358" y1="404" x2="374" y2="404" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="526" y1="404" x2="542" y2="404" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="694" y1="404" x2="710" y2="404" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
