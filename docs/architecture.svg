<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/><stop offset="0.5" stop-color="#3b82f6"/><stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gSrc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5f7ff"/><stop offset="1" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="gProc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0fdf9"/><stop offset="1" stop-color="#d1fae5"/></linearGradient>
    <linearGradient id="gModel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5f9ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="gStore" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf5"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
    <linearGradient id="gOut" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff5f5"/><stop offset="1" stop-color="#fee2e2"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="960" height="600" rx="18" fill="#ffffff"/>
  <rect x="0" y="0" width="960" height="6" fill="url(#accent)"/>

  <!-- Header -->
  <text x="480" y="52" text-anchor="middle" font-size="27" font-weight="800" fill="#0f172a">💳 CardWise</text>
  <text x="480" y="78" text-anchor="middle" font-size="13" fill="#64748b">Retrieval-Augmented Generation pipeline · grounded credit-card Q&amp;A with citations</text>

  <!-- ===== INGESTION ===== -->
  <rect x="40" y="104" width="196" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="58" y="122" font-size="12" font-weight="700" letter-spacing="1.1" fill="#475569">📥  INGESTION · offline</text>
  <rect x="24" y="142" width="824" height="106" rx="16" fill="#f8fafc" stroke="#eef2f6"/>

  <g filter="url(#shadow)">
    <rect x="40"  y="158" width="180" height="74" rx="14" fill="url(#gSrc)"   stroke="#818cf8" stroke-width="1.5"/>
    <rect x="244" y="158" width="180" height="74" rx="14" fill="url(#gProc)"  stroke="#34d399" stroke-width="1.5"/>
    <rect x="448" y="158" width="180" height="74" rx="14" fill="url(#gProc)"  stroke="#34d399" stroke-width="1.5"/>
    <rect x="652" y="158" width="180" height="74" rx="14" fill="url(#gModel)" stroke="#60a5fa" stroke-width="1.5"/>
  </g>
  <text x="130" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">📄 PDF Documents</text>
  <text x="130" y="212" text-anchor="middle" font-size="11.5" fill="#6366f1">data/raw</text>
  <text x="334" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">Document Loader</text>
  <text x="334" y="212" text-anchor="middle" font-size="11.5" fill="#059669">PyMuPDF</text>
  <text x="538" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">Text Chunker</text>
  <text x="538" y="212" text-anchor="middle" font-size="11.5" fill="#059669">recursive split</text>
  <text x="742" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Embedding Model</text>
  <text x="742" y="212" text-anchor="middle" font-size="11.5" fill="#3b82f6">Gemini</text>

  <line x1="220" y1="195" x2="242" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="424" y1="195" x2="446" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="628" y1="195" x2="650" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== VECTOR STORE (hub) ===== -->
  <g filter="url(#shadow)">
    <rect x="390" y="278" width="180" height="74" rx="14" fill="url(#gStore)" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="480" y="311" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">🗄️ Vector Database</text>
  <text x="480" y="332" text-anchor="middle" font-size="11.5" fill="#b45309">Chroma · persistent</text>

  <path d="M742,232 C742,268 600,258 562,278" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="648" y="256" font-size="11" font-weight="600" fill="#64748b">index</text>

  <path d="M430,352 C430,388 320,382 302,412" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="332" y="382" font-size="11" font-weight="600" fill="#64748b">retrieve</text>

  <!-- ===== QUERY ===== -->
  <rect x="40" y="364" width="178" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="58" y="382" font-size="12" font-weight="700" letter-spacing="1.1" fill="#475569">💬  QUERY · runtime</text>
  <rect x="24" y="402" width="912" height="106" rx="16" fill="#f8fafc" stroke="#eef2f6"/>

  <g filter="url(#shadow)">
    <rect x="40"  y="418" width="164" height="74" rx="14" fill="url(#gSrc)"   stroke="#818cf8" stroke-width="1.5"/>
    <rect x="220" y="418" width="164" height="74" rx="14" fill="url(#gProc)"  stroke="#34d399" stroke-width="1.5"/>
    <rect x="400" y="418" width="164" height="74" rx="14" fill="url(#gProc)"  stroke="#34d399" stroke-width="1.5"/>
    <rect x="580" y="418" width="164" height="74" rx="14" fill="url(#gModel)" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="760" y="418" width="164" height="74" rx="14" fill="url(#gOut)"   stroke="#fb7185" stroke-width="1.5"/>
  </g>
  <text x="122" y="451" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">💬 User Query</text>
  <text x="122" y="472" text-anchor="middle" font-size="11.5" fill="#6366f1">user input</text>
  <text x="302" y="451" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">Retriever</text>
  <text x="302" y="472" text-anchor="middle" font-size="11.5" fill="#059669">MMR · k=6</text>
  <text x="482" y="451" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">Prompt Builder</text>
  <text x="482" y="472" text-anchor="middle" font-size="11.5" fill="#059669">citation rules</text>
  <text x="662" y="451" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">LLM</text>
  <text x="662" y="472" text-anchor="middle" font-size="11.5" fill="#3b82f6">Gemini 2.5 Flash</text>
  <text x="842" y="451" text-anchor="middle" font-size="15" font-weight="700" fill="#9f1239">✅ Grounded Answer</text>
  <text x="842" y="472" text-anchor="middle" font-size="11.5" fill="#e11d48">with citations</text>

  <line x1="204" y1="455" x2="218" y2="455" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="384" y1="455" x2="398" y2="455" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="564" y1="455" x2="578" y2="455" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="744" y1="455" x2="758" y2="455" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Tech strip ===== -->
  <text x="480" y="544" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2.5" fill="#94a3b8">BUILT WITH</text>
  <g font-size="12" font-weight="600" fill="#334155">
    <rect x="262" y="556" width="86" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="305" y="574" text-anchor="middle">LangChain</text>
    <rect x="360" y="556" width="70" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="395" y="574" text-anchor="middle">Gemini</text>
    <rect x="442" y="556" width="72" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="478" y="574" text-anchor="middle">Chroma</text>
    <rect x="526" y="556" width="82" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="567" y="574" text-anchor="middle">PyMuPDF</text>
    <rect x="620" y="556" width="80" height="27" rx="13.5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="660" y="574" text-anchor="middle">Streamlit</text>
  </g>
</svg>
